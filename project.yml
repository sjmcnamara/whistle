name: FindMyFam

options:
  bundleIdPrefix: org.findmyfam
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.1"
  createIntermediateGroups: true
  groupSortPosition: top
  indentWidth: 4
  tabWidth: 4

packages:
  NostrSDK:
    url: https://github.com/rust-nostr/nostr-sdk-swift
    from: "0.44.2"
  MDKBindings:
    url: https://github.com/marmot-protocol/mdk-swift
    # Pinned commit — no tags exist yet. Update when a release is tagged.
    revision: 80eab77ea5aba570115f3f5dd9ad76052eae2b60

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

targets:
  FindMyFam:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources/Assets.xcassets
    dependencies:
      - package: NostrSDK
      - package: MDKBindings
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.findmyfam.app
        DEVELOPMENT_TEAM: 3V55494FNM
        TARGETED_DEVICE_FAMILY: "1"
        MARKETING_VERSION: "0.8.2"
        CURRENT_PROJECT_VERSION: "5"
        PRODUCT_NAME: FindMyFam
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: Resources/FindMyFam.entitlements
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: Famstr
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        NSLocationWhenInUseUsageDescription: "Famstr needs your location to share it with your family group."
        NSLocationAlwaysAndWhenInUseUsageDescription: "Famstr needs background location access to keep your family updated when the app is in the background."
        NSFaceIDUsageDescription: "Famstr uses Face ID to unlock the app and protect your family data."
        NSCameraUsageDescription: "Famstr uses the camera to scan QR invite codes."
        NFCReaderUsageDescription: "Famstr uses NFC to receive invite codes by tapping phones together."
        NSLocalNetworkUsageDescription: "Famstr uses the local network to share invites with nearby family members."
        NSBonjourServices:
          - _famstr._tcp
          - _famstr._udp
        CFBundleURLTypes:
          - CFBundleURLSchemes:
            - famstr
            CFBundleURLName: org.findmyfam.app
        UIBackgroundModes:
          - location
          - fetch
        # File sharing — allows inspecting the MLS SQLite DB via Finder/Files.
        # TODO: Remove once SQLCipher encryption is restored (v0.7).
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true

  FindMyFamTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FindMyFamTests
    dependencies:
      - target: FindMyFam
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.findmyfam.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  FindMyFam:
    build:
      targets:
        FindMyFam: all
        FindMyFamTests: [test]
    test:
      targets:
        - FindMyFamTests
