name: Whistle

options:
  bundleIdPrefix: org.findmyfam
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.1"
  createIntermediateGroups: true
  groupSortPosition: top
  indentWidth: 4
  tabWidth: 4

packages:
  WhistleCore:
    path: WhistleCore
  NostrSDK:
    url: https://github.com/rust-nostr/nostr-sdk-swift
    from: "0.44.2"
  MDKBindings:
    url: https://github.com/marmot-protocol/mdk-swift
    # Pinned commit — no tags exist yet. Update when a release is tagged.
    revision: c58a77f

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

targets:
  Whistle:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources/Assets.xcassets
    dependencies:
      - package: WhistleCore
      - package: NostrSDK
      - package: MDKBindings
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.findmyfam.app
        DEVELOPMENT_TEAM: 3V55494FNM
        TARGETED_DEVICE_FAMILY: "1"
        MARKETING_VERSION: "1.0.2"
        CURRENT_PROJECT_VERSION: "17"
        PRODUCT_NAME: Whistle
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: Resources/Whistle.entitlements
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: Whistle
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        NSLocationWhenInUseUsageDescription: "Whistle needs your location to share it with your family group."
        NSLocationAlwaysAndWhenInUseUsageDescription: "Whistle needs background location access to keep your family updated when the app is in the background."
        NSFaceIDUsageDescription: "Whistle uses Face ID to unlock the app and protect your family data."
        NSCameraUsageDescription: "Whistle uses the camera to scan QR invite codes."
        NFCReaderUsageDescription: "Whistle uses NFC to receive invite codes by tapping phones together."
        NSLocalNetworkUsageDescription: "Whistle uses the local network to share invites with nearby family members."
        NSBonjourServices:
          - _whistle._tcp
          - _whistle._udp
        CFBundleURLTypes:
          - CFBundleURLSchemes:
            - whistle
            CFBundleURLName: org.findmyfam.app
        UIBackgroundModes:
          - location
          - fetch

  WhistleTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: WhistleTests
    dependencies:
      - target: Whistle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.findmyfam.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Whistle:
    build:
      targets:
        Whistle: all
        WhistleTests: [test]
    test:
      targets:
        - WhistleTests
