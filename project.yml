name: FindMyFam

options:
  bundleIdPrefix: org.findmyfam
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.1"
  createIntermediateGroups: true
  groupSortPosition: top
  indentWidth: 4
  tabWidth: 4

packages:
  NostrSDK:
    url: https://github.com/rust-nostr/nostr-sdk-swift
    from: "0.44.2"
  MDKBindings:
    url: https://github.com/marmot-protocol/mdk-swift
    # Pinned commit — no tags exist yet. Update when a release is tagged.
    revision: 80eab77ea5aba570115f3f5dd9ad76052eae2b60

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

targets:
  FindMyFam:
    type: application
    platform: iOS
    sources:
      - path: Sources
    resources:
      - path: Resources
    dependencies:
      - package: NostrSDK
      - package: MDKBindings
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.findmyfam.app
        DEVELOPMENT_TEAM: 3V55494FNM
        TARGETED_DEVICE_FAMILY: "1"
        MARKETING_VERSION: "0.2.0"
        CURRENT_PROJECT_VERSION: "1"
        PRODUCT_NAME: FindMyFam
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: Famstr
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        NSLocationWhenInUseUsageDescription: "Famstr needs your location to share it with your family group."
        NSLocationAlwaysAndWhenInUseUsageDescription: "Famstr needs background location access to keep your family updated when the app is in the background."
        UIBackgroundModes:
          - location
          - fetch

  FindMyFamTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FindMyFamTests
    dependencies:
      - target: FindMyFam
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.findmyfam.tests

schemes:
  FindMyFam:
    build:
      targets:
        FindMyFam: all
        FindMyFamTests: [test]
    test:
      targets:
        - FindMyFamTests
