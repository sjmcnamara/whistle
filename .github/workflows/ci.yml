name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # iOS — WhistleCore SPM Tests (pure Swift, fast)
  # ──────────────────────────────────────────────
  ios-core-tests:
    name: WhistleCore Tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - name: Run SPM tests
        run: cd WhistleCore && swift test --enable-code-coverage

      - name: Generate coverage report
        run: |
          BINARY=$(find WhistleCore/.build/debug -name "WhistleCorePackageTests.xctest" | head -1)/Contents/MacOS/WhistleCorePackageTests
          PROFDATA=$(find WhistleCore/.build/debug/codecov -name "*.profdata" | head -1)
          if [ -n "$BINARY" ] && [ -n "$PROFDATA" ]; then
            xcrun llvm-cov export "$BINARY" \
              -instr-profile="$PROFDATA" \
              -format=lcov \
              --ignore-filename-regex="\.build|Tests" \
              > WhistleCore/coverage.lcov
          fi

      - uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: WhistleCore/coverage.lcov
          flags: whistlecore
          fail_ci_if_error: false

  # ──────────────────────────────────────────────
  # iOS — Full app build + test
  # ──────────────────────────────────────────────
  ios-tests:
    name: iOS Build & Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Generate Xcode project
        run: |
          brew install xcodegen
          xcodegen generate

      - name: Build & Test
        run: |
          xcodebuild test \
            -project Whistle.xcodeproj \
            -scheme Whistle \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -only-testing:WhistleTests \
            -resultBundlePath TestResults.xcresult \
            -enableCodeCoverage YES \
            | xcpretty --color || true

      - name: Generate coverage report
        run: |
          xcrun xccov view --report --json TestResults.xcresult > coverage.json

      - uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.json
          flags: ios
          fail_ci_if_error: false

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: ios-test-results
          path: TestResults.xcresult

  # ──────────────────────────────────────────────
  # Android — Unit tests (shared + app)
  # ──────────────────────────────────────────────
  android-tests:
    name: Android Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle.kts', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Shared module tests
        working-directory: android
        run: ./gradlew :shared:test

      - name: App unit tests
        working-directory: android
        run: ./gradlew :app:testDebugUnitTest

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: android-test-results
          path: android/app/build/reports/tests/

  # ──────────────────────────────────────────────
  # SwiftLint
  # ──────────────────────────────────────────────
  swiftlint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Lint
        run: swiftlint lint --strict --reporter github-actions-logging

  # ──────────────────────────────────────────────
  # Dependency Review (PR only)
  # ──────────────────────────────────────────────
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v4
